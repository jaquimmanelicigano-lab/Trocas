<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Utilizador - Admin</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="display: block;">
  <%- include('../partials/header') %>

  <main class="main">
    <div class="container">
      <div style="max-width: 500px; margin: 0 auto;">
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Editar Utilizador</h2>
          </div>
          <div class="card-body">
            <form action="/admin/utilizadores/<%= editUser.id %>/editar" method="POST">
              <div class="form-group">
                <label class="form-label">Nome</label>
                <input type="text" name="nome" class="form-control" value="<%= editUser.nome %>" required>
              </div>
              <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" value="<%= editUser.email %>" required>
              </div>
              <div class="form-group">
                <label class="form-label">Telefone</label>
                <input type="text" name="telefone" class="form-control" value="<%= editUser.telefone || '' %>">
              </div>
              <div class="form-group">
                <label class="form-label">Tipo</label>
                <select name="tipo" class="form-control">
                  <option value="user" <%= editUser.tipo === 'user' ? 'selected' : '' %>>Utilizador</option>
                  <option value="admin" <%= editUser.tipo === 'admin' ? 'selected' : '' %>>Administrador</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">
                  <input type="checkbox" name="ativo" <%= editUser.ativo ? 'checked' : '' %>> Ativo
                </label>
              </div>
              <div class="d-flex gap-1">
                <button type="submit" class="btn btn-primary" style="flex: 1;">Guardar</button>
                <a href="/admin/utilizadores" class="btn btn-outline">Cancelar</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <%- include('../partials/footer') %>
</body>
</html>
