{% include 'partials/header.html' %}

<!-- Main Content - Editar Utilizador -->
<main class="main">
  <div class="container">
    <div style="max-width: 500px; margin: 0 auto;">
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Editar Utilizador</h2>
        </div>
        <div class="card-body">
          <form action="{{ url_for('admin_edit_user', id=utilizador.id) }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
              <label class="form-label">Nome</label>
              <input type="text" name="nome" class="form-control" value="{{ utilizador.nome }}" required>
            </div>

            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-control" value="{{ utilizador.email }}" required>
            </div>

            <div class="form-group">
              <label class="form-label">Telefone</label>
              <input type="text" name="telefone" class="form-control" value="{{ utilizador.telefone or '' }}">
            </div>

            <div class="form-group">
              <label class="form-label">Tipo</label>
              <select name="tipo" class="form-control">
                <option value="user" {% if utilizador.tipo == 'user' %}selected{% endif %}>Utilizador</option>
                <option value="admin" {% if utilizador.tipo == 'admin' %}selected{% endif %}>Administrador</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">
                <input type="checkbox" name="ativo" {% if utilizador.ativo %}checked{% endif %}> Ativo
              </label>
            </div>

            <div class="d-flex gap-1">
              <button type="submit" class="btn btn-primary" style="flex: 1;">Guardar</button>
              <a href="{{ url_for('admin_users') }}" class="btn btn-outline">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>

{% include 'partials/footer.html' %}
